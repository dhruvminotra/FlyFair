<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fly Fairly — Airport Search</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e7e9ee; --dim:#9aa3b2;
          --accent:#4f8cff; --good:#36c692; --warn:#e2b341; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--txt); }
  header { padding:28px 24px 8px; max-width:1100px; margin:0 auto; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:var(--dim); font-size:13px; }
  .wrap { max-width:1100px; margin:0 auto; padding:16px 24px 60px; }
  #q { width:100%; padding:14px 16px; font-size:18px; border-radius:10px; border:1px solid var(--line);
       background:var(--card); color:var(--txt); outline:none; }
  #q:focus { border-color:var(--accent); }
  .chips { margin:12px 0 4px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:var(--card);
          color:var(--dim); cursor:pointer; font-size:13px; }
  .chip:hover { color:var(--txt); border-color:var(--accent); }
  .cols { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:18px; }
  @media (max-width:760px){ .cols{ grid-template-columns:1fr; } }
  .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--dim);
              margin:0 0 10px; display:flex; align-items:center; gap:8px; }
  .panel h2 .tag { font-size:11px; padding:2px 7px; border-radius:6px; }
  .ours .tag { background:rgba(79,140,255,.15); color:var(--accent); }
  .ref .tag { background:rgba(226,179,65,.15); color:var(--warn); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
          margin-bottom:10px; }
  .card .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .label { font-weight:600; }
  .badge { font-size:11px; padding:2px 7px; border-radius:6px; background:#232a36; color:var(--dim);
           white-space:nowrap; }
  .badge.good { background:rgba(54,198,146,.15); color:var(--good); }
  .airport { display:flex; gap:10px; align-items:baseline; margin-top:6px; }
  .iata { font-family:ui-monospace,Menlo,monospace; font-weight:700; color:var(--accent);
          min-width:38px; }
  .ref .iata { color:var(--warn); }
  .aname { flex:1; }
  .ctx { color:var(--dim); font-size:12px; }
  .empty { color:var(--dim); padding:8px 2px; }
  .note { color:var(--dim); font-size:12px; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>Fly Fairly — Airport Search</h1>
  <div class="sub">Our in-memory engine (left) vs Google Flights location search (right, reference only).</div>
</header>
<div class="wrap">
  <input id="q" placeholder="Try: Hawaii · Bali · LON · London · 東京 · دبي · Londn · Florida" autocomplete="off" autofocus/>
  <div class="chips" id="chips"></div>
  <div class="cols">
    <div class="panel ours">
      <h2><span class="tag">OURS</span> Fly Fairly engine</h2>
      <div id="ours"><div class="empty">Type to search…</div></div>
    </div>
    <div class="panel ref">
      <h2><span class="tag">REFERENCE</span> Google Flights</h2>
      <div id="ref"><div class="empty">—</div></div>
    </div>
  </div>
</div>

<script>
const examples = ["Hawaii","Bali","LON","London","東京","北京","서울","دبي","Florida","Londn","Sao Paulo","Roma"];
const chips = document.getElementById('chips');
examples.forEach(e => {
  const c = document.createElement('span'); c.className='chip'; c.textContent=e;
  c.onclick = () => { q.value=e; run(); };
  chips.appendChild(c);
});

const q = document.getElementById('q');
const oursEl = document.getElementById('ours');
const refEl = document.getElementById('ref');
let timer = null;
q.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(run, 220); });

function esc(s){ return (s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

async function run(){
  const query = q.value.trim();
  if(!query){ oursEl.innerHTML='<div class="empty">Type to search…</div>'; refEl.innerHTML='<div class="empty">—</div>'; return; }
  oursEl.innerHTML='<div class="empty">searching…</div>';
  refEl.innerHTML='<div class="empty">searching…</div>';
  renderOurs(query);
  renderRef(query);
}

async function renderOurs(query){
  try {
    const r = await fetch('/api/search?q='+encodeURIComponent(query));
    const data = await r.json();
    if(!data.results.length){ oursEl.innerHTML='<div class="empty">No results.</div>'; return; }
    oursEl.innerHTML = data.results.map(res => {
      const tier = res.matchType.replace('_',' ').toLowerCase();
      const good = res.matchType.startsWith('EXACT') || res.matchType==='ALIAS' || res.matchType==='REGION_EXPANSION';
      const airports = res.airports.map(a =>
        `<div class="airport"><span class="iata">${esc(a.iata)}</span><span class="aname">${esc(a.name)}<div class="ctx">${esc(a.context)}</div></span></div>`).join('');
      return `<div class="card"><div class="top"><span class="label">${esc(res.label)}</span>
        <span class="badge ${good?'good':''}">${esc(tier)}</span></div>${airports}</div>`;
    }).join('');
  } catch(e){ oursEl.innerHTML='<div class="empty">error</div>'; }
}

async function renderRef(query){
  try {
    const r = await fetch('/api/compare?q='+encodeURIComponent(query));
    const data = await r.json();
    if(!data.enabled){ refEl.innerHTML='<div class="empty">Comparison disabled.</div><div class="note">Set SEARCHAPI_KEY and restart to enable Google Flights comparison.</div>'; return; }
    const locs = data.locations || [];
    if(locs.length && locs[0].error){ refEl.innerHTML='<div class="empty">'+esc(locs[0].error)+'</div>'; return; }
    if(!locs.length){ refEl.innerHTML='<div class="empty">No results.</div>'; return; }
    refEl.innerHTML = locs.map(loc => {
      const airports = (loc.airports||[]).map(a =>
        `<div class="airport"><span class="iata">${esc(a.code)}</span><span class="aname">${esc(a.title)}<div class="ctx">${esc(a.city)} · ${esc(a.distance)}</div></span></div>`).join('');
      return `<div class="card"><div class="top"><span class="label">${esc(loc.full_name)}</span>
        <span class="badge">${esc(loc.type)}</span></div>${airports}</div>`;
    }).join('');
  } catch(e){ refEl.innerHTML='<div class="empty">error</div>'; }
}
</script>
</body>
</html>
