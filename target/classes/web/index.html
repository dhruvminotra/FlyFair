<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Fly Fairly — Airport Search</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e7e9ee; --dim:#9aa3b2;
          --accent:#4f8cff; --good:#36c692; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--txt); }
  .wrap { max-width:760px; margin:0 auto; padding:28px 24px 60px; }
  h1 { margin:0 0 4px; font-size:22px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:18px; }
  #q { width:100%; padding:14px 16px; font-size:18px; border-radius:10px; border:1px solid var(--line);
       background:var(--card); color:var(--txt); outline:none; }
  #q:focus { border-color:var(--accent); }
  .chips { margin:12px 0 4px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:var(--card);
          color:var(--dim); cursor:pointer; font-size:13px; }
  .chip:hover { color:var(--txt); border-color:var(--accent); }
  #results { margin-top:18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
          margin-bottom:10px; }
  .card .top { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .label { font-weight:600; }
  .badge { font-size:11px; padding:2px 7px; border-radius:6px; background:#232a36; color:var(--dim);
           white-space:nowrap; }
  .badge.good { background:rgba(54,198,146,.15); color:var(--good); }
  .airport { display:flex; gap:10px; align-items:baseline; margin-top:6px; }
  .iata { font-family:ui-monospace,Menlo,monospace; font-weight:700; color:var(--accent); min-width:38px; }
  .aname { flex:1; }
  .ctx { color:var(--dim); font-size:12px; }
  .empty { color:var(--dim); padding:8px 2px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Fly Fairly — Airport Search</h1>
  <div class="sub">Type a code, city, region, country, nickname, or another language — even with a typo.</div>
  <input id="q" placeholder="Try: Hawaii · Bali · LON · London · 東京 · دبي · Londn · Florida" autocomplete="off" autofocus/>
  <div class="chips" id="chips"></div>
  <div id="results"><div class="empty">Type to search…</div></div>
</div>

<script>
const examples = ["Hawaii","Bali","LON","London","東京","北京","서울","دبي","Florida","Londn","Sao Paulo","Japan"];
const chips = document.getElementById('chips');
examples.forEach(e => {
  const c = document.createElement('span'); c.className='chip'; c.textContent=e;
  c.onclick = () => { q.value=e; run(); };
  chips.appendChild(c);
});

const q = document.getElementById('q');
const out = document.getElementById('results');
let timer = null;
q.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(run, 220); });

function esc(s){ return (s||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

async function run(){
  const query = q.value.trim();
  if(!query){ out.innerHTML='<div class="empty">Type to search…</div>'; return; }
  out.innerHTML='<div class="empty">searching…</div>';
  try {
    const r = await fetch('/api/search?q='+encodeURIComponent(query));
    const data = await r.json();
    if(!data.results.length){ out.innerHTML='<div class="empty">No results.</div>'; return; }
    out.innerHTML = data.results.map(res => {
      const tier = res.matchType.replace('_',' ').toLowerCase();
      const good = res.matchType.startsWith('EXACT') || res.matchType==='ALIAS'
                || res.matchType==='REGION_EXPANSION' || res.matchType==='COUNTRY_EXPANSION';
      const airports = res.airports.map(a =>
        `<div class="airport"><span class="iata">${esc(a.iata)}</span><span class="aname">${esc(a.name)}<div class="ctx">${esc(a.context)}</div></span></div>`).join('');
      return `<div class="card"><div class="top"><span class="label">${esc(res.label)}</span>
        <span class="badge ${good?'good':''}">${esc(tier)}</span></div>${airports}</div>`;
    }).join('');
  } catch(e){ out.innerHTML='<div class="empty">error</div>'; }
}
</script>
</body>
</html>
